spring:
  application:
    name: panda-server
  profiles:
    active: dev

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.panda.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

panda:
  jwt:
    secret-key: 12345678901234567890123456789012
    ttl: 604800000
    token-name: Authorization
  mqtt:
    enabled: ${PANDA_MQTT_ENABLED:false}
    server-uri: ${PANDA_MQTT_SERVER_URI:tcp://172.20.10.2:1883}
    client-id: ${PANDA_MQTT_CLIENT_ID:panda-server}
    username: ${PANDA_MQTT_USERNAME:}
    password: ${PANDA_MQTT_PASSWORD:}
    qos: ${PANDA_MQTT_QOS:1}
    telemetry-topic: ${PANDA_MQTT_TELEMETRY_TOPIC:panda/scooter/+/telemetry}
    command-topic-prefix: ${PANDA_MQTT_COMMAND_TOPIC_PREFIX:panda/scooter}
